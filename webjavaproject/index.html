<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Component Order Form</title>
    <link rel="stylesheet" href="style.css"/>

</head>
<body>
    <div class="container">
        <h1>Computer Component Order Form</h1>
        <form id="orderForm">
          <div class="form-group">
            <label for="monitor">MONITOR:</label>
            <input type="number" id="monitor" class="component" data-price="250">
          </div>
          <div class="form-group">
            <label for="mouse">MOUSE:</label>
            <input type="number" id="mouse" class="component" data-price="350">
          </div>
          <div class="form-group">
            <label for="ram">RAM (GB):</label>
            <input type="number" id="ram" class="component" data-price="100">
          </div>
          <div class="form-group">
            <label for="storage">STORAGE (GB):</label>
            <input type="number" id="storage" class="component" data-price="0.1">
          </div>
          <div class="form-group">
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" min="1" value="1">
            </div>
            <div class="form-group">
                <label for="total">Total Cost:</label>
                <input type="text" id="total" readonly>
                </div>
                <button type="button" onclick="calculateTotal()">
                    Calculate Total</button>
                </form>

         </div>
         <script src="script.js"></script>
    
</body>
</html>
